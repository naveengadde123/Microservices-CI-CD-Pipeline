apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: microservice-app

  template:
    metadata:
      labels:
        app: microservice-app

    spec:
      containers:
      - name: microservice
        image: naveen/microservice:latest
        ports:
        - containerPort: 5000